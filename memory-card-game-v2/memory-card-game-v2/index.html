<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="top">
      <div>
        <p class="tag">HTML5 GAME</p>
        <h1>Memory Match</h1>
        <p class="subtitle">Open two cards at a time. Match all same pairs to win.</p>
      </div>

      <div class="stats">
        <div><span>Moves</span><b id="moves">0</b></div>
        <div><span>Time</span><b id="timer">00:00</b></div>
        <div><span>Pairs</span><b><span id="pairs">0</span>/8</b></div>
      </div>
    </section>

    <section class="controls">
      <button id="restartBtn">Restart</button>
      <button id="shuffleBtn" class="secondary">Shuffle</button>
    </section>

    <section id="gameBoard" class="board"></section>

    <div id="message" class="message"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
